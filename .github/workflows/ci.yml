# CI for the docs-kit gem: run the suite + lint on every supported Ruby.
#
# `bundle exec rake` is `spec + rubocop` (see Rakefile) — the same command run
# locally. SimpleCov enforces the 80% coverage floor from within the suite, so a
# coverage regression fails this job too. The generator specs run in the same job:
# they invoke the install generator against a tmp skeleton via plain Thor (no Rails
# boot), so they need no heavier harness than the rest of the suite.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a force-push / new commit to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rake:
    name: rake (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run the suite + lint
        run: bundle exec rake

  # The dogfood docs site (docs/) is a real Rails app that consumes the gem via
  # `path: ".."`. Run its RSpec suite — request specs (progressive enhancement,
  # the .md/llms.txt routes) + browser system specs (the SEO/OG head end-to-end,
  # the chrome, theme persistence) driven by a real Playwright chromium. This is
  # the coverage the gem's own isolated component specs can't give: only a booted
  # app resolves a logical og_image path to the served, digested /assets URL — the
  # exact gap that let the og:image 404 ship.
  docs-site:
    name: docs site (RSpec + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    env:
      RAILS_ENV: test
      HEADLESS: "true"
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
      # The app depends on the gem via `path: ".."`, whose gemspec lists files with
      # `git ls-files` — so every commit changes the path-gem's digest and bundler's
      # frozen mode (forced by bundler-cache) fails with "the gemspecs for path gems
      # changed". Unfreeze for this app; the lock is still respected.
      BUNDLE_FROZEN: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: docs

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: docs-playwright-${{ runner.os }}-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            docs-playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx --bun playwright install chromium chromium-headless-shell

      - name: Install Playwright system dependencies
        run: sudo bunx --bun playwright install-deps chromium 2>/dev/null || true

      - name: RSpec (request + system specs)
        run: bundle exec rspec

  # The optional-dependency gate: docs-kit's MCP server is built on the `mcp`
  # gem, which is NOT a runtime dependency (a consuming site adds it itself). This
  # leg installs WITHOUT the `mcp` group and runs the suite — proving the feature
  # no-ops cleanly (the MCP specs self-skip) when the gem is absent, so a site
  # that never bundles `mcp` is byte-identical to before this feature.
  without-mcp:
    name: gate (no mcp gem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install without the optional mcp gem
        run: |
          bundle config set --local without mcp
          bundle install

      - name: Run the suite (must stay green with mcp absent)
        run: bundle exec rspec
