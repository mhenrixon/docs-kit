name: Reusable docs deploy
on:
  workflow_call:
    inputs:
      image: { required: true, type: string }
      service: { required: true, type: string }
      ruby_version: { required: false, default: "3.4", type: string }
      working_directory: { required: false, default: "docs", type: string }
      dockerfile: { required: false, default: "docs/Dockerfile", type: string }
      build_context: { required: false, default: ".", type: string }
      registry: { required: false, default: "ghcr.io", type: string }
    secrets:
      SSH_PRIVATE_KEY: { required: false }
      DEPLOY_HOST: { required: false }
      DEPLOY_DOMAIN: { required: false }
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Determine image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then TAG="$RELEASE_TAG"; else TAG="sha-$(git rev-parse --short HEAD)"; fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
