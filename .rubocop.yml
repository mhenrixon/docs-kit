plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # SimpleCov's HTML report — generated, not source.
    - "coverage/**/*"
    - "tmp/**/*"
    # The dogfood docs site is a separate consuming app with its own bundle and
    # .rubocop.yml (it inherits rubocop-rails-omakase, not installed in the gem's
    # bundle). Linting it from here crashes config loading; it lints itself.
    - "docs/**/*"
    # Agent scratch worktrees — never source.
    - ".claude/**/*"

Style/Documentation:
  Enabled: false

# The custom RuboCop cops ship rubocop as a gemspec DEVELOPMENT dependency on
# purpose: `docs_kit/rubocop` requires it lazily (never a runtime dep), and
# pinning it here lets the gem's own cop specs run. This is a deliberate design
# choice (see issue #22), not a stray dependency to move to the Gemfile.
Gemspec/DevelopmentDependencies:
  Exclude:
    - "docs-kit.gemspec"

# lib/rubocop/cop/** holds RuboCop cops. RenderComponentPreferred is upstreamed
# VERBATIM from the proven consumer copy (issue #22 says: don't rewrite it), so
# its on_send node-matching dispatch trips the size/complexity metrics by design.
# Cops are inherently branchy AST walkers — exempt the tree from the two metrics
# it doesn't already cover elsewhere (AbcSize/MethodLength are extended below).
Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/rubocop/cop/**/*"
Metrics/PerceivedComplexity:
  Exclude:
    - "lib/rubocop/cop/**/*"

# lib/docs-kit.rb must match the hyphenated gem name for Bundler's auto-require;
# it just requires the underscored real entrypoint.
Naming/FileName:
  Exclude:
    - "lib/docs-kit.rb"

# Phlex components subclass Phlex::HTML, whose #initialize takes no args; calling
# super is unnecessary and Phlex doesn't expect it.
Lint/MissingSuper:
  AllowedParentClasses:
    - Phlex::HTML
    - Phlex::SGML

# The entrypoint deliberately defines both DocsKit (config) and the Docs Phlex::Kit
# in one file, mirroring the daisyui gem's loader bootstrap.
Style/OneClassPerFile:
  Exclude:
    - "lib/docs_kit.rb"

# The shell head/page templates are linear builders; their ABC is inherent to the
# markup they emit, not accidental complexity. Configuration#initialize is a flat
# list of default assignments (one per knob) — its ABC is the knob count, not
# branching complexity.
Metrics/AbcSize:
  Exclude:
    - "app/components/docs_ui/shell.rb"
    - "app/components/docs_ui/page.rb"
    - "lib/docs_kit/configuration.rb"
    # Verbatim-upstreamed cop (issue #22) — its AST dispatch is branchy by design.
    - "lib/rubocop/cop/**/*"

# ApiRequest/ApiClient are Data value objects and RequestExample is a public
# component; their keyword-arg constructors mirror the documented API (method:,
# path:, body:, query:, headers:, clients:), which is inherently wide.
Metrics/ParameterLists:
  Exclude:
    - "lib/docs_kit/api_request.rb"
    - "app/components/docs_ui/request_example.rb"

# ApiRequest deliberately names a member `method:` — it IS the HTTP method, the
# documented public field templates read as `request.method`. The shadowing of
# Object#method is intended (no reflection is done on the struct).
Lint/DataDefineOverride:
  Exclude:
    - "lib/docs_kit/api_request.rb"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120
  Exclude:
    # Verbatim-upstreamed cop (issue #22) — one add_offense line runs to 122.
    - "lib/rubocop/cop/**/*"

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    # Rails app template — one big after_bundle block by design.
    - "lib/docs_kit/templates/**/*"
    # The `rake release[X.Y.Z]` task is one long sequential release script
    # (version bump → build → commit → push → gh release), matching the sibling
    # gems (daisyui/phlex-reactive/pgbus). Its length is steps, not complexity.
    - "Rakefile"

# Generators are procedural wiring — one method per install step — so they're
# naturally long and flat, not complex. Configuration is the per-site config
# surface: one accessor + one default per knob, plus small derived readers — its
# length is the knob count, not accidental complexity. Operation is the OpenAPI
# bridge value object — one small reader per render-target shape (parameter_rows,
# body_rows, error_rows, example_*, code_samples); Schema is its traversal helper
# (type_label, rows, example synthesis). Both are wide-but-flat by design.
Metrics/ClassLength:
  Exclude:
    - "lib/generators/**/*"
    - "lib/docs_kit/configuration.rb"
    - "lib/docs_kit/open_api/operation.rb"
    - "lib/docs_kit/open_api/schema.rb"
    # A composite renderer: logo + hero (eyebrow/title/lead/install/ctas) + a
    # feature grid + a doc index. Each part is a small focused method; the class
    # is long only because it renders several sections, like the OpenAPI ones above.
    - "app/components/docs_ui/landing.rb"

Metrics/MethodLength:
  Max: 25
  # Configuration#initialize is a flat one-assignment-per-knob default list; its
  # length is the knob count, not logic (AbcSize is excluded for the same reason).
  Exclude:
    - "lib/docs_kit/configuration.rb"
    # Verbatim-upstreamed cop (issue #22) — on_send is one long dispatch method.
    - "lib/rubocop/cop/**/*"

RSpec/ExampleLength:
  Max: 12
  # Cop specs pair an expect_offense fixture with an expect_correction fixture,
  # both multi-line heredocs — the example length is the fixture size, not logic.
  Exclude:
    - "spec/rubocop/**/*"

RSpec/MultipleExpectations:
  Max: 6

RSpec/NestedGroups:
  Max: 4

# Generator specs live under spec/generators/ (the conventional Rails location),
# not a path mirroring the DocsKit::Generators:: namespace.
RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/generators/**/*"
