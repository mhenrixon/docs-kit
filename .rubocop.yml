plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    # SimpleCov's HTML report — generated, not source.
    - "coverage/**/*"
    - "tmp/**/*"
    # The dogfood docs site is a separate consuming app with its own bundle and
    # .rubocop.yml (it inherits rubocop-rails-omakase, not installed in the gem's
    # bundle). Linting it from here crashes config loading; it lints itself.
    - "docs/**/*"
    # Agent scratch worktrees — never source.
    - ".claude/**/*"

Style/Documentation:
  Enabled: false

# lib/docs-kit.rb must match the hyphenated gem name for Bundler's auto-require;
# it just requires the underscored real entrypoint.
Naming/FileName:
  Exclude:
    - "lib/docs-kit.rb"

# Phlex components subclass Phlex::HTML, whose #initialize takes no args; calling
# super is unnecessary and Phlex doesn't expect it.
Lint/MissingSuper:
  AllowedParentClasses:
    - Phlex::HTML
    - Phlex::SGML

# The entrypoint deliberately defines both DocsKit (config) and the Docs Phlex::Kit
# in one file, mirroring the daisyui gem's loader bootstrap.
Style/OneClassPerFile:
  Exclude:
    - "lib/docs_kit.rb"

# The shell head/page templates are linear builders; their ABC is inherent to the
# markup they emit, not accidental complexity. Configuration#initialize is a flat
# list of default assignments (one per knob) — its ABC is the knob count, not
# branching complexity.
Metrics/AbcSize:
  Exclude:
    - "app/components/docs_ui/shell.rb"
    - "app/components/docs_ui/page.rb"
    - "lib/docs_kit/configuration.rb"

# ApiRequest/ApiClient are Data value objects and RequestExample is a public
# component; their keyword-arg constructors mirror the documented API (method:,
# path:, body:, query:, headers:, clients:), which is inherently wide.
Metrics/ParameterLists:
  Exclude:
    - "lib/docs_kit/api_request.rb"
    - "app/components/docs_ui/request_example.rb"

# ApiRequest deliberately names a member `method:` — it IS the HTTP method, the
# documented public field templates read as `request.method`. The shadowing of
# Object#method is intended (no reflection is done on the struct).
Lint/DataDefineOverride:
  Exclude:
    - "lib/docs_kit/api_request.rb"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    # Rails app template — one big after_bundle block by design.
    - "lib/docs_kit/templates/**/*"

# Generators are procedural wiring — one method per install step — so they're
# naturally long and flat, not complex. Configuration is the per-site config
# surface: one accessor + one default per knob, plus small derived readers — its
# length is the knob count, not accidental complexity.
Metrics/ClassLength:
  Exclude:
    - "lib/generators/**/*"
    - "lib/docs_kit/configuration.rb"

Metrics/MethodLength:
  Max: 25
  # Configuration#initialize is a flat one-assignment-per-knob default list; its
  # length is the knob count, not logic (AbcSize is excluded for the same reason).
  Exclude:
    - "lib/docs_kit/configuration.rb"

RSpec/ExampleLength:
  Max: 12

RSpec/MultipleExpectations:
  Max: 6

RSpec/NestedGroups:
  Max: 4

# Generator specs live under spec/generators/ (the conventional Rails location),
# not a path mirroring the DocsKit::Generators:: namespace.
RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/generators/**/*"
