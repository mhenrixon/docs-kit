# Kamal deploy → the oss-infrastructure server (Cloudflare Tunnel + kamal-proxy).
# service/image = the repo OWNER/REPO so the ghcr package auto-links to the
# repo and GITHUB_TOKEN can push + pull it (no PAT). See docs-kit's README.
service: docs-kit
image: mhenrixon/docs-kit

servers:
  web:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>

ssh:
  user: <%= ENV.fetch("DEPLOY_SSH_USER", "oss") %>

proxy:
  host: <%= ENV["DEPLOY_DOMAIN"] %>
  app_port: 3000
  ssl: false
  healthcheck:
    path: /up
    interval: 5
    timeout: 30

registry:
  server: ghcr.io
  username: mhenrixon
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  # Run kamal from docs/; the build context is the repo root (..) so the path gem
  # `gem "docs-kit", path: ".."` resolves. dockerfile is relative to docs/.
  context: ..
  dockerfile: Dockerfile

env:
  clear:
    RAILS_SERVE_STATIC_FILES: "true"
    RAILS_LOG_TO_STDOUT: "true"
    # Inline SECRET_KEY_BASE — this is a public, stateless docs site with no user
    # accounts or sensitive data, so the key carries no real risk here (it signs
    # cookies only). Rotate with `bin/rails secret` if ever needed.
    SECRET_KEY_BASE: "de60d191f13962f9d4a506e8daf5d88dac41a011571376508cb3620a49a3bbcec5879b520c56b78d94ea6fd1f18065e53eabe6d6e3e0ae4476a6b8b470af61b9"
